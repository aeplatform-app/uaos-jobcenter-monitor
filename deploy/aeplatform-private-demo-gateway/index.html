<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow,noarchive">
<title>Nicht öffentlich verfügbar</title>
<style>
:root{--bg:#070b16;--card:#11182d;--text:#eef3ff;--muted:#aeb8d6;--accent:#7dd3fc;--ok:#4ade80;--warn:#facc15;--bad:#fb7185}
*{box-sizing:border-box}body{margin:0;font-family:Arial,Inter,sans-serif;background:radial-gradient(circle at top,#172554 0,#070b16 48%,#030712 100%);color:var(--text);line-height:1.65}
.wrap{max-width:980px;margin:auto;padding:54px 22px}.hero{padding:38px;border:1px solid #263456;border-radius:26px;background:rgba(17,24,45,.88);box-shadow:0 22px 80px rgba(0,0,0,.38)}
h1{font-size:38px;line-height:1.12;margin:0 0 12px}h2{margin-top:30px}.muted{color:var(--muted)}.badge{display:inline-block;padding:6px 11px;border-radius:999px;background:#1e293b;color:#bae6fd;font-weight:700}
.card{background:rgba(15,23,42,.78);border:1px solid #263456;border-radius:18px;padding:18px;margin-top:16px}
.ok{color:var(--ok)}.warn{color:var(--warn)}.bad{color:var(--bad)}
ul{padding-left:22px}footer{margin-top:36px;color:var(--muted);font-size:14px}
</style>
</head>
<body>
<main class="wrap">
<section class="hero">
<span class="badge">Private Demo</span>
<h1>Diese Seite ist nicht öffentlich verfügbar.</h1>
<p class="muted">Bitte verwenden Sie den direkten privaten Link, den Sie erhalten haben.</p>
<p>Diese Demo ist nicht als öffentliche Homepage gedacht.</p>
</section>
<footer>AE Platform · admin@aeplatform.app</footer>
</main>
</body>
</html>
