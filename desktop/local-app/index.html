<!doctype html>
<html>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>UAOS HyperStation</title>
<style>
:root{
  color-scheme:light;
  --bg:#f4f5f7;
  --panel:#ffffff;
  --panel2:#f9fafb;
  --line:#dce2ea;
  --text:#17191f;
  --muted:#58606d;
  --accent:#1f6feb;
  --accent2:#3d6f7b;
  --danger:#d83b5f;
}
*{box-sizing:border-box}
body{
  margin:0;
  min-height:100vh;
  background:linear-gradient(135deg,#ffffff 0%,#f4f5f7 48%,#e8eef4 100%);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Arial,sans-serif;
}
button,select,input{
  font:inherit;
}
.shell{
  display:grid;
  grid-template-columns:280px 1fr;
  min-height:100vh;
}
.sidebar{
  padding:24px;
  border-right:1px solid var(--line);
  background:rgba(255,255,255,.78);
  box-shadow:18px 0 45px rgba(22,32,46,.05);
}
.brand{
  display:flex;
  align-items:center;
  gap:14px;
  margin-bottom:34px;
}
.logo{
  width:52px;
  height:52px;
  border-radius:8px;
  display:grid;
  place-items:center;
  font-weight:800;
  font-size:25px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#ffffff;
  box-shadow:0 15px 32px rgba(31,111,235,.18);
}
.brand h1{margin:0;font-size:24px}
.brand p{margin:2px 0 0;color:var(--muted)}
nav{display:grid;gap:10px;margin-bottom:28px}
.nav{
  text-align:left;
  border:1px solid transparent;
  color:var(--muted);
  background:transparent;
  padding:13px 14px;
  border-radius:8px;
  cursor:pointer;
}
.nav.active,.nav:hover{
  color:var(--text);
  border-color:var(--line);
  background:var(--panel);
}
.side-card{
  display:flex;
  justify-content:space-between;
  gap:12px;
  padding:15px;
  border:1px solid var(--line);
  border-radius:8px;
  background:var(--panel);
  margin-bottom:12px;
}
.side-card span{color:var(--muted)}
.main{
  padding:28px;
}
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:18px;
  margin-bottom:18px;
}
.eyebrow{
  margin:0 0 6px;
  color:var(--accent2);
  letter-spacing:0;
  text-transform:uppercase;
  font-size:12px;
}
.topbar h2{
  margin:0;
  font-size:34px;
  letter-spacing:0;
}
.top-actions{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}
.hero-card{
  display:flex;
  justify-content:space-between;
  gap:22px;
  align-items:flex-end;
  border:1px solid var(--line);
  border-radius:8px;
  padding:26px;
  background:rgba(255,255,255,.82);
  box-shadow:0 18px 45px rgba(22,32,46,.08);
  margin-bottom:18px;
}
.hero-card h3{
  margin:0 0 8px;
  font-size:30px;
  letter-spacing:0;
}
.hero-card p{
  margin:0;
  color:var(--muted);
  max-width:720px;
}
.pill-row{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}
.pill-row span{
  border:1px solid var(--line);
  background:var(--panel2);
  color:#2b313b;
  padding:8px 10px;
  border-radius:8px;
  white-space:nowrap;
}
.grid{
  display:grid;
  grid-template-columns:1fr 1.35fr;
  gap:16px;
}
.panel{
  border:1px solid var(--line);
  border-radius:8px;
  padding:20px;
  background:var(--panel);
  box-shadow:0 10px 30px rgba(27,39,54,.07);
  min-height:260px;
}
.panel h3{margin:0 0 16px;font-size:19px}
.controls label{
  display:block;
  color:var(--muted);
  margin:14px 0 6px;
}
select,input{
  width:100%;
  border:1px solid var(--line);
  background:var(--panel2);
  color:var(--text);
  border-radius:8px;
  padding:12px 13px;
  outline:none;
}
input[type=range]{padding:6px}
button{
  border:1px solid var(--line);
  border-radius:8px;
  padding:12px 14px;
  background:#ffffff;
  color:var(--text);
  cursor:pointer;
}
button:hover{background:#f1f5f9}
.primary{
  border-color:var(--accent);
  background:var(--accent);
  color:#ffffff;
  box-shadow:0 12px 24px rgba(31,111,235,.18);
}
.primary:hover{background:#195fc7}
.ghost{background:#ffffff}
.danger{
  border-color:var(--danger);
  background:var(--danger);
  color:#ffffff;
}
.transport{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:10px;
  margin-top:18px;
}
pre{
  margin:0;
  max-height:440px;
  overflow:auto;
  white-space:pre-wrap;
  word-break:break-word;
  color:#e8edf6;
  background:#111827;
  border:1px solid #1f2937;
  border-radius:8px;
  padding:16px;
}
.logs{
  display:grid;
  gap:8px;
}
.log-row{
  padding:10px 12px;
  border-radius:8px;
  background:var(--panel2);
  color:#3f4652;
  border:1px solid var(--line);
}
.timeline-rows{
  display:grid;
  gap:8px;
  margin-top:14px;
}
.timeline-row{
  display:grid;
  grid-template-columns:1fr auto auto;
  gap:8px;
  align-items:center;
  padding:10px;
  border:1px solid var(--line);
  border-radius:8px;
  background:var(--panel2);
}
.timeline-row span{color:var(--muted)}
.mini{
  min-height:32px;
  padding:6px 9px;
}
@media(max-width:900px){
  .shell{grid-template-columns:1fr}
  .sidebar{border-right:0;border-bottom:1px solid var(--line)}
  .grid{grid-template-columns:1fr}
  .topbar,.hero-card{align-items:flex-start;flex-direction:column}
}
</style>

</head>
<body>
<div id="app"></div>
</body>
</html>
