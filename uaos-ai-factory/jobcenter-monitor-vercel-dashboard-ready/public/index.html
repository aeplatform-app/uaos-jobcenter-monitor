<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="refresh" content="0; url=/jobcenter/">
  <title>UAOS / AE Platform</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #07111d;
      --panel: #111d2d;
      --text: #f5f8fc;
      --muted: #a8b6c8;
      --accent: #42d392;
      --line: #26384f;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(145deg, #10283f, var(--bg) 60%);
      color: var(--text);
    }
    main {
      width: min(760px, calc(100vw - 32px));
      padding: 30px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(17, 29, 45, 0.94);
      box-shadow: 0 22px 72px rgba(0, 0, 0, 0.35);
    }
    h1 { margin: 0 0 10px; font-size: clamp(32px, 6vw, 54px); letter-spacing: 0; }
    p { margin: 0 0 22px; color: var(--muted); line-height: 1.55; }
    a {
      display: inline-block;
      margin-right: 10px;
      margin-bottom: 10px;
      padding: 12px 15px;
      border-radius: 6px;
      background: var(--accent);
      color: #07111d;
      text-decoration: none;
      font-weight: 800;
    }
    a.secondary {
      color: var(--text);
      background: transparent;
      border: 1px solid var(--line);
    }
  </style>
</head>
<body>
  <main>
    <h1>UAOS / AE Platform</h1>
    <p>Public Jobcenter monitor for the prototype and preparation of self-employment.</p>
    <a href="/jobcenter/">Open Jobcenter Monitor</a>
    <a class="secondary" href="/status/">Open Status</a>
  </main>
</body>
</html>
