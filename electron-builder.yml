appId: com.uaos.universalarranger
productName: UAOS Universal Arranger
copyright: Copyright © 2026 UAOS

directories:
  output: release-windows

files:
  - package.json
  - electron/**/*
  - uaos-live-clean/dist/**/*

asar: true

win:
  icon: build-assets/uaos.ico
  executableName: UAOS
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64

nsis:
  artifactName: UAOS-V1-Setup-${version}-${arch}.${ext}
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: UAOS Universal Arranger

portable:
  artifactName: UAOS-V1-Portable-${version}-${arch}.${ext}

publish:
  provider: github
  owner: Sari-raslan
  repo: universal-arranger-os
  releaseType: prerelease

generateUpdatesFilesForAllChannels: true
